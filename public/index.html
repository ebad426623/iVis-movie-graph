<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>iVis Movie Graph</title>
  <link
    rel="stylesheet"
    href="https://unpkg.com/cytoscape-context-menus/cytoscape-context-menus.css"
  />
</head>
<body>
  <h1>iVis Movie Graph</h1>

  <form id="searchForm">
    <label for="actorName">Actor Name:</label>
    <input id="actorName" name="actorName" type="text" value="Tom Hanks" required />

    <label for="depth">Actor Number:</label>
    <input id="depth" name="depth" type="number" value="0" min="0" required />

    <button type="submit">Submit</button>

    <button type="button" id="findClusterBtn">Find Cluster</button>
  </form>

  <div
    id="cy"
    style="width: 100%; height: calc(100vh - 150px); border: 1px solid black; margin-top: 20px; margin-bottom: 20px;"
  ></div>

  <script src="https://unpkg.com/cytoscape/dist/cytoscape.min.js"></script>
  <script src="https://unpkg.com/layout-base/layout-base.js"></script>
  <script src="https://unpkg.com/cose-base/cose-base.js"></script>
  <script src="https://unpkg.com/cytoscape-fcose/cytoscape-fcose.js"></script>
  <script src="https://unpkg.com/cytoscape-context-menus/cytoscape-context-menus.js"></script>
  <script src="https://unpkg.com/cytoscape-layout-utilities/cytoscape-layout-utilities.js"></script>
  <script src="https://unpkg.com/cytoscape-view-utilities/cytoscape-view-utilities.js"></script>
  <script src="/app.js"></script>
</body>
</html>
